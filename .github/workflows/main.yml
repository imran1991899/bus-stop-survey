name: Stealth Auth Keep-Alive

on:
  schedule:
    - cron: '47 * * * *' # Random minute to look human
  workflow_dispatch:

jobs:
  ping_streamlit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          pip install playwright playwright-stealth
          playwright install chromium

      - name: Run Stealth Session
        run: |
          python - <<EOF
          import time
          import random
          from playwright.sync_api import sync_playwright
          # FIX: Import the function specifically to avoid 'module not callable' error
          from playwright_stealth import stealth

          def run_stealth_session():
              with sync_playwright() as p:
                  browser = p.chromium.launch(headless=True)
                  
                  # Set a very standard screen size and user agent
                  context = browser.new_context(
                      user_agent="Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/122.0.0.0 Safari/537.36",
                      viewport={'width': 1920, 'height': 1080}
                  )
                  
                  page = context.new_page()
                  
                  # Apply stealth patches
                  stealth(page)

                  # Random initial wait to simulate someone typing/clicking
                  time.sleep(random.uniform(3, 8))

                  print("🚀 Navigating to Streamlit app...")
                  
                  try:
                      # Long timeout for cold starts
                      page.goto("https://bus-stop-survey-dpl6qeby3stuvpiexjhovk.streamlit.app/", 
                                wait_until="networkidle", 
                                timeout=90000)
                      
                      # Human interaction 1: Small wait
                      time.sleep(5)
                      
                      # Human interaction 2: Scroll down to trigger lazy loading/WebSockets
                      print("🖱️ Simulating human scroll...")
                      page.mouse.wheel(0, 400)
                      time.sleep(random.uniform(2, 4))
                      
                      # Check if loaded
                      title = page.title()
                      print(f"✅ Success! Page Title: {title}")
                      
                      # Final wait to ensure Streamlit's WebSocket heartbeat completes
                      time.sleep(10)
                      
                  except Exception as e:
                      print(f"❌ Error: {str(e)}")
                  finally:
                      browser.close()

          if __name__ == "__main__":
              run_stealth_session()
          EOF
