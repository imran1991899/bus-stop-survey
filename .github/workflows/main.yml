name: Stealth Keep-Alive

on:
  schedule:
    - cron: '45 * * * *' 
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Instant Stealth Ping
        run: |
          # We removed -L to prevent the redirect loop (Error 47)
          # We use --head to just "knock on the door" without downloading the whole page
          
          curl -s --head \
            -H "User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/122.0.0.0 Safari/537.36" \
            -H "Referer: https://www.google.com/" \
            "https://bus-stop-survey-dpl6qeby3stuvpiexjhovk.streamlit.app/" > /dev/null
          
          echo "Ping sent successfully at $(date). App is being kept awake."
