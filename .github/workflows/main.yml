name: Stealth Auth Keep-Alive

on:
  schedule:
    - cron: '45 * * * *' 
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Authenticated Stealth Ping
        run: |
          # 1. We use -L (follow) but limit to 5 to avoid infinite loops
          # 2. -c /tmp/cookies.txt saves the session "cookie" (very human-like)
          # 3. We use your full Auth URL
          
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -L --max-redirs 5 \
            -c /tmp/cookies.txt \
            -H "User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/122.0.0.0 Safari/537.36" \
            -H "Referer: https://accounts.google.com/" \
            "https://bus-stop-survey-dpl6qeby3stuvpiexjhovk.streamlit.app/?state=HxBK6diBD8maX9FMVT7VrZX9xLTsg6&iss=https://accounts.google.com&code=4/0AfrIepB31O8kYV23igKSLezvh5ZzykjaZaLjfXnjvJ9c120UdKPVWF7F3oKAdeQDTXVMkg&scope=https://www.googleapis.com/auth/drive.file%20https://www.googleapis.com/auth/spreadsheets")

          echo "Final Response Code: $STATUS"

          # Now 200 is the goal because the Auth link should land you on the app
          if [ "$STATUS" -eq 200 ]; then
            echo "✅ SUCCESS: App is awake and Session is Authenticated!"
          else
            echo "⚠️ NOTE: Received $STATUS. The token might have expired, but the ping still woke the server."
          fi
