name: Stealth Auth Keep-Alive

on:
  schedule:
    # Runs at minute 43 of every hour. 
    # Using a "random" minute helps avoid being flagged as a predictable bot.
    - cron: '43 * * * *'
  workflow_dispatch: # Allows you to run it manually from the "Actions" tab

jobs:
  ping_streamlit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Stealth Tools
        run: |
          pip install playwright playwright-stealth
          playwright install chromium

      - name: Run Human-Mimic Session
        run: |
          python - <<EOF
          import time
          import random
          from playwright.sync_api import sync_playwright
          from playwright_stealth import stealth

          def run_stealth_session():
              with sync_playwright() as p:
                  # Use a very common, modern User Agent
                  browser = p.chromium.launch(headless=True)
                  context = browser.new_context(
                      user_agent="Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/122.0.0.0 Safari/537.36",
                      viewport={'width': 1280, 'height': 720}
                  )
                  
                  page = context.new_page()

                  # This is the "Magic" that hides the Playwright/Bot signature
                  stealth(page)

                  # Random pause before starting (Human-like jitter)
                  time.sleep(random.uniform(2, 7))

                  print("🚀 Navigating to Streamlit app...")
                  
                  try:
                      # 90 second timeout is safer for 'cold starts' (waking up from sleep)
                      page.goto("https://bus-stop-survey-dpl6qeby3stuvpiexjhovk.streamlit.app/", 
                                wait_until="networkidle", 
                                timeout=90000)
                      
                      # Wait for the Streamlit 'stApp' container to load
                      page.wait_for_selector(".stApp", timeout=20000)
                      
                      # Mimic human behavior: Scroll down, then back up slightly
                      print("🖱️ Simulating human interaction (scrolling)...")
                      page.mouse.wheel(0, 600)
                      time.sleep(random.uniform(1, 3))
                      page.mouse.wheel(0, -150)
                      
                      print(f"✅ Success! Page Loaded. Title: {page.title()}")
                      
                      # Crucial: Keep the tab open for 15s to let the WebSocket heartbeat 
                      # tell the Streamlit server that the session is active.
                      time.sleep(15)
                      
                  except Exception as e:
                      print(f"❌ Error during session: {str(e)}")
                  finally:
                      browser.close()

          if __name__ == "__main__":
              run_stealth_session()
          EOF
