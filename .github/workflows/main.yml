name: Stealth Auth Keep-Alive

on:
  schedule:
    - cron: '47 * * * *' 
  workflow_dispatch:

jobs:
  ping_streamlit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      # We add a step to ensure the browsers are fully installed 
      # and the environment is clean
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          pip install playwright playwright-stealth
          playwright install chromium

      - name: Run Stealth Session
        run: |
          python - <<EOF
          import time
          import random
          from playwright.sync_api import sync_playwright
          import playwright_stealth # Use direct import

          def run_stealth_session():
              with sync_playwright() as p:
                  # Launching Chromium
                  browser = p.chromium.launch(headless=True)
                  
                  # Set a very standard browser context
                  context = browser.new_context(
                      user_agent="Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/122.0.0.0 Safari/537.36",
                      viewport={'width': 1920, 'height': 1080}
                  )
                  
                  page = context.new_page()
                  
                  # FIX: Explicitly call the function from the module 
                  # to avoid 'module is not callable' error
                  playwright_stealth.stealth(page)

                  # Random initial wait to simulate human thinking
                  time.sleep(random.uniform(3, 7))

                  print("🚀 Navigating to Streamlit app...")
                  
                  try:
                      # 90s timeout to allow for Streamlit 'Cold Boots'
                      page.goto("https://bus-stop-survey-dpl6qeby3stuvpiexjhovk.streamlit.app/", 
                                wait_until="networkidle", 
                                timeout=90000)
                      
                      # Wait for the app container to exist
                      page.wait_for_selector("div.stApp", timeout=30000)
                      
                      # Human-like interaction: Scroll
                      print("🖱️ Simulating human scroll...")
                      page.mouse.wheel(0, 500)
                      time.sleep(random.uniform(2, 5))
                      
                      title = page.title()
                      print(f"✅ Success! Page Title: {title}")
                      
                      # Stay on page for 10s to let the WebSocket 'Keep-Alive' register
                      time.sleep(10)
                      
                  except Exception as e:
                      print(f"❌ Error occurred: {str(e)}")
                  finally:
                      browser.close()

          if __name__ == "__main__":
              run_stealth_session()
          EOF
