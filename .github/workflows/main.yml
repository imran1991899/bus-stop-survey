name: Keep App Awake Stealth

on:
  schedule:
    - cron: '0 * * * *' # Triggers every hour to check if it should ping
  workflow_dispatch:      # Allows you to click a button to test it manually

jobs:
  ping_app:
    runs-on: ubuntu-latest
    steps:
      - name: Random Probability Gate
        id: gate
        run: |
          # Generates a random number 1, 2, or 3
          # This creates the variety in intervals (sometimes 1hr, 3hr, etc.)
          CHANCE=$(( ( RANDOM % 3 ) + 1 ))
          if [ "$CHANCE" -eq 1 ]; then
            echo "run_ping=true" >> $GITHUB_OUTPUT
            echo "Decision: The dice rolled 1. Proceeding with ping."
          else
            echo "run_ping=false" >> $GITHUB_OUTPUT
            echo "Decision: Skipping this hour to vary pattern."
          fi

      - name: Stealth Ping to Streamlit
        if: steps.gate.outputs.run_ping == 'true'
        run: |
          # 1. Random delay (1 to 15 minutes) so pings don't happen at :00 sharp
          DELAY=$(( ( RANDOM % 900 ) + 1 ))
          echo "Waiting $DELAY seconds before sending request..."
          sleep $DELAY
          
          # 2. Perform the ping with Browser Headers to avoid bot detection
          # -I: Get headers only
          # -L: Follow redirects
          # -H: Spoof a real Windows Chrome browser
          RESPONSE=$(curl -I -L -s \
            -H "User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36" \
            -H "Accept-Language: en-US,en;q=0.9" \
            -H "Referer: https://www.google.com/" \
            "https://bus-stop-survey-99f8wusughejfcfvrvxmyl.streamlit.app/?t=$(date +%s)" | head -n 1)
          
          echo "Status: $RESPONSE"
          echo "Ping completed at $(date)"
